<!DOCTYPE html>
<html>
<head>
    <title>Clientes</title>
</head>
<body>
    <h1>Lista de clientes</h1>

    <ul>
        {% for cliente in clientes %}
            <li>{{ cliente.nombre }} - {{ cliente.email }}</li>
        {% empty %}
            <li>No hay clientes registrados.</li>
        {% endfor %}
    </ul>

    <a href="/">Volver al inicio</a>
</body>
</html>
