{% extends 'gestion/base.html' %}
{% block content %}

<section style="max-width:900px; margin:50px auto; padding:30px;">
    <h2>Pedidos</h2>
    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Canal de Venta</th>
            </tr>
        </thead>
        <tbody>
            {% for pedido in pedidos %}
                <tr>
                    <td>{{ pedido.cliente.nombre }}</td>
                    <td>{{ pedido.producto.nombre }}</td>
                    <td>{{ pedido.cantidad }}</td>
                    <td>{{ pedido.canal_venta.nombre }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</section>

{% endblock %}
