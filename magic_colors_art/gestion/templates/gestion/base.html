{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Magic Colors Art</title>
    <link rel="stylesheet" href="{% static 'gestion/css/style.css' %}">
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-contenedor">

        <div class="logo-contenedor">
            <img src="{% static 'gestion/images/logo.jfif' %}" alt="Magic Colors Art" class="logo">
        </div>

        <nav class="menu">
            <a href="{% url 'home' %}">Inicio</a>
            <a href="{% url 'crear_pedido' %}">Realizar Pedido</a>
            {% if user.is_staff %}
                <a href="{% url 'ver_pedidos' %}">Ver Pedidos</a>
            {% endif %}
        </nav>

    </div>
</header>

<!-- Contenido principal -->
<main>
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer>
    <p>&copy; 2026 Magic Colors Art - Todos los derechos reservados</p>
</footer>

</body>
</html>
